<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gluk — bibliotheek</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --white: #fafafa; --gray-1: #f4f4f2; --gray-2: #e8e8e5;
    --gray-4: #888884; --gray-5: #444440;
    --success: #2a6e4a; --success-bg: #e8f5ee;
    --error: #8b2020; --error-bg: #fceaea;
    --info: #1a4a6e; --info-bg: #e8f0f8;
    --font: "DM Sans", system-ui, sans-serif;
    --mono: "DM Mono", monospace;
    --radius: 8px; --radius-lg: 14px;
  }
  body { font-family: var(--font); background: var(--white); color: var(--black); min-height: 100vh; font-size: 14px; line-height: 1.6; }
  header { background: var(--black); color: var(--white); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 400; flex: 1; }
  .header-user { display: flex; align-items: center; gap: 8px; }
  .header-user img { width: 28px; height: 28px; border-radius: 50%; }
  .header-user span { font-size: 11px; color: #888; }
  .btn-signout { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; }
  .btn-signout:hover { color: #fff; border-color: #666; }
  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--gray-2); padding-bottom: 0; }
  .tab { font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: var(--radius) var(--radius) 0 0; border: 1px solid transparent; background: none; color: var(--gray-4); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab:hover { color: var(--black); }
  .tab.active { color: var(--black); border-bottom: 2px solid var(--black); background: var(--white); }

  /* LOGIN */
  .login-screen { text-align: center; padding: 80px 24px; }
  .login-screen .logo { font-size: 36px; margin-bottom: 10px; }
  .login-screen h2 { font-size: 22px; font-weight: 400; margin-bottom: 8px; }
  .login-screen p { font-size: 13px; color: var(--gray-4); margin-bottom: 32px; }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .toolbar-count { font-size: 12px; color: var(--gray-4); font-family: var(--mono); margin-right: auto; }
  .filter-btn { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gray-2); background: var(--white); color: var(--gray-5); cursor: pointer; }
  .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
  .save-all-btn { font-size: 11px; padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--gray-2); background: var(--black); color: var(--white); cursor: pointer; }

  /* PROGRESS */
  .progress-bar { height: 3px; background: var(--gray-2); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--black); border-radius: 2px; transition: width 0.3s; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }

  /* CARD */
  .card { background: var(--white); border: 1px solid var(--gray-2); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.2s; }
  .card.saved { border-color: #7dc9a0; }
  .thumb { width: 100%; height: 170px; background: var(--gray-1); overflow: hidden; position: relative; cursor: pointer; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .no-media { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--gray-4); font-size: 12px; }
  .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.25); opacity: 0; transition: opacity 0.2s; }
  .thumb:hover .play-overlay { opacity: 1; }
  .play-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; padding-left: 3px; }
  .card-body { padding: 14px; }
  .card-name { font-size: 11px; font-family: var(--mono); color: var(--gray-5); margin-bottom: 10px; word-break: break-all; }
  .card-status { font-size: 11px; margin-top: 8px; padding: 5px 8px; border-radius: 6px; }
  .card-status.saved { background: var(--success-bg); color: var(--success); }
  .card-status.error { background: var(--error-bg); color: var(--error); }
  .card-status.loading { background: var(--info-bg); color: var(--info); }

  /* FORM ELEMENTS */
  .section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gray-4); margin-bottom: 5px; display: block; }
  .tags-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
  .tag-chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--gray-2); background: var(--gray-1); color: var(--gray-5); cursor: pointer; transition: all 0.12s; user-select: none; }
  .tag-chip:hover { border-color: var(--gray-5); color: var(--black); }
  .tag-chip.active { background: var(--black); color: var(--white); border-color: var(--black); }
  .tag-extra, .desc-area { width: 100%; font-family: var(--font); font-size: 12px; padding: 6px 9px; border: 1px solid var(--gray-2); border-radius: 6px; background: var(--gray-1); color: var(--black); }
  .tag-extra:focus, .desc-area:focus { outline: none; border-color: var(--gray-5); background: var(--white); }
  .tag-extra::placeholder, .desc-area::placeholder { color: var(--gray-4); }
  .desc-area { resize: vertical; min-height: 65px; line-height: 1.5; margin-bottom: 10px; }
  .selects { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 8px 0 10px; }
  select { font-family: var(--font); font-size: 11px; padding: 5px 6px; border: 1px solid var(--gray-2); border-radius: 6px; background: var(--gray-1); color: var(--black); width: 100%; }
  button.sm { font-family: var(--font); font-size: 11px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--gray-2); background: var(--white); color: var(--black); cursor: pointer; }
  button.sm.primary { background: var(--black); color: var(--white); border-color: var(--black); }
  button.sm:hover { opacity: 0.8; }
  .status { font-size: 12px; padding: 8px 12px; border-radius: var(--radius); margin-top: 10px; }
  .status.info { background: var(--info-bg); color: var(--info); }
  .status.success { background: var(--success-bg); color: var(--success); }
  .status.error { background: var(--error-bg); color: var(--error); }

  /* VERWIJDER */
  .btn-delete { font-family: var(--font); font-size: 11px; padding: 6px 14px; border-radius: var(--radius); border: 1px solid #e8c0c0; background: #fff5f5; color: #8b2020; cursor: pointer; }
  .btn-delete:hover { background: #fceaea; border-color: #c08080; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }

  /* BEVESTIGING MODAL */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--white); border-radius: var(--radius-lg); padding: 28px; max-width: 400px; width: 90%; }
  .confirm-box h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .confirm-box p { font-size: 12px; color: var(--gray-4); margin-bottom: 20px; line-height: 1.6; }
  .confirm-btns { display: flex; gap: 10px; justify-content: flex-end; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 64px 24px; color: var(--gray-4); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  #tab-foto { display: none; }
  #tab-video { display: none; }
  #login-section { display: block; }
</style>
</head>
<body>

<header>
  <h1>gluk — bibliotheek</h1>
  <div class="header-user" id="header-user" style="display:none;">
    <img id="user-avatar" src="" alt="">
    <span id="user-email-short"></span>
    <button class="btn-signout" onclick="signOut()">Uitloggen</button>
  </div>
</header>

<div class="container">

  <!-- LOGIN -->
  <div id="login-section">
    <div class="login-screen">
      <div class="logo">📚</div>
      <h2>gluk bibliotheek</h2>
      <p>Tag foto's en video's · alles op één plek</p>
      <div id="g_id_onload"
        data-client_id="889720988332-tamhka2qnnf496n6425tah4bb2aoch4o.apps.googleusercontent.com"
        data-callback="onGoogleSignIn"
        data-auto_select="true">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="sign_in_with"
        data-shape="rectangular"
        data-logo_alignment="left">
      </div>
      <div id="login-status" style="margin-top:12px;"></div>
    </div>
  </div>

  <!-- TABS -->
  <div id="main-section" style="display:none;">
    <div class="tabs">
      <button class="tab active" id="btn-foto" onclick="switchTab('foto')">📸 Foto's</button>
      <button class="tab" id="btn-video" onclick="switchTab('video')">🎬 Video's</button>
    </div>

    <!-- ── FOTO TAB ── -->
    <div id="tab-foto">
      <div id="foto-status"></div>
      <div class="progress-bar"><div class="progress-fill" id="foto-progress" style="width:0%"></div></div>
      <div class="toolbar">
        <span class="toolbar-count" id="foto-count">—</span>
        <button class="save-all-btn" onclick="saveAllFotos()">↓ Alles opslaan</button>
      </div>
      <div class="grid" id="foto-grid"></div>
    </div>

    <!-- ── VIDEO TAB ── -->
    <div id="tab-video">
      <div id="video-status"></div>
      <div class="progress-bar"><div class="progress-fill" id="video-progress" style="width:0%"></div></div>
      <div class="toolbar">
        <span class="toolbar-count" id="video-count">—</span>
        <button class="save-all-btn" onclick="saveAllVideos()">↓ Alles opslaan</button>
      </div>
      <div class="grid" id="video-grid"></div>
    </div>
  </div>
</div>

<!-- BEVESTIGING MODAL -->
<div class="confirm-overlay" id="confirm-modal">
  <div class="confirm-box">
    <h3 id="confirm-title">Verwijderen?</h3>
    <p id="confirm-desc">Dit kan niet ongedaan gemaakt worden.</p>
    <div class="confirm-btns">
      <button class="sm" onclick="closeConfirm()">Annuleren</button>
      <button class="sm" id="confirm-ok" style="background:#8b2020;color:#fff;border-color:#8b2020;">Ja, verwijderen</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── CONFIGURATIE ──────────────────────────────────────────────────
const CLIENT_ID    = "889720988332-tamhka2qnnf496n6425tah4bb2aoch4o.apps.googleusercontent.com";
const SCOPES       = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/spreadsheets";
const SHEET_ID     = "1lmGy58AXP9nBcC2ZZgz_uuqiAkvh52m92cjuHt47-vI";
const FOTO_FOLDER  = "1ZqCDMUpczpjG9mVLLFOx5y8u0kut--Aw";
const VIDEO_FOLDER = "1k-sZKRoSJGEOzW4mkxBf029-cLx1Wm7Z";

// ── STATE ─────────────────────────────────────────────────────────
let accessToken  = null;
let tokenClient  = null;
let fotos        = [];
let videos       = [];
let videoFilter  = 'alle';
let sheetRowMap  = {};
let fotoLoaded   = false;
let videoLoaded  = false;
const loadedPreviews = new Set();

const $ = id => document.getElementById(id);

// ── SIGN-IN ───────────────────────────────────────────────────────
function onGoogleSignIn(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (tr) => {
      if (tr.error) { setStatus('login-status', 'Fout: ' + tr.error, 'error'); return; }
      accessToken = tr.access_token;
      setTimeout(refreshToken, 55 * 60 * 1000);
      $('user-avatar').src = payload.picture || '';
      $('user-email-short').textContent = payload.email;
      $('header-user').style.display = 'flex';
      $('login-section').style.display = 'none';
      $('main-section').style.display = 'block';
      $('tab-foto').style.display = 'block';
      laadFotos();
    }
  });
  tokenClient.requestAccessToken({ prompt: '' });
}

function refreshToken() {
  if (!tokenClient) return;
  tokenClient.requestAccessToken({ prompt: '' });
  setTimeout(refreshToken, 55 * 60 * 1000);
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  accessToken = null;
  $('main-section').style.display = 'none';
  $('login-section').style.display = 'block';
  $('header-user').style.display = 'none';
  fotos = []; videos = []; fotoLoaded = false; videoLoaded = false;
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(tab) {
  ['foto','video'].forEach(t => {
    $(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
    $(`btn-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'video' && !videoLoaded) laadVideos();
}

// ── STATUS ────────────────────────────────────────────────────────
function setStatus(id, msg, type) {
  $(id).innerHTML = msg ? `<div class="status ${type}">${msg}</div>` : '';
}

// ── TAGS & SELECTS ────────────────────────────────────────────────
const FOTO_TAGS = [
  "zwembad","sauna","haard","tuin","interieur","architectuur","keuken","slaapkamer","badkamer","terras",
  "marmer","beton","hout","glas","baksteen",
  "natuur","westhoek","velden","bossen","water","bloemen","sneeuw",
  "licht","details","avond","ochtend","zonsondergang","nacht","zwembadverlichting",
  "samenzijn","ontbijt","rust","stilte","warmte","gezelligheid",
  "fiets","bbq","teppanyaki","vuurschaal",
  "kinderen","familie","koppel","flamingo","bloempot","kaars"
];
const VIDEO_TAGS = [
  "zwembad","sauna","haard","tuin","interieur","keuken","slaapkamer","badkamer","terras",
  "natuur","westhoek","velden","bossen","water","architectuur",
  "licht","schaduw","details","ochtend","avond","zonsondergang",
  "sneeuw","bloemen","regen",
  "movement","timelapse","drone","aerial","splash","stoom","rook","vuur","kaarsen","wind",
  "samenzijn","ontbijt","kinderen","koppel","vrienden","relaxen","zwemmen",
  "marmer","beton","hout","glas","flamingo","fiets"
];
const SEIZOEN = ["seizoensneutraal","lente","zomer","herfst","winter"];
const WEER    = ["geen","zonnig","bewolkt","gouden uur","blauw uur","regen","mist","sneeuw","hittegolf","wind","nacht"];
const SFEER   = ["rustig","energiek","intiem","feestelijk","inspirerend","cinematisch"];

// ═══════════════════════════════════════════════════════════════════
// FOTO
// ═══════════════════════════════════════════════════════════════════
async function laadFotos() {
  if (fotoLoaded) return;
  setStatus('foto-status', 'Foto\'s laden...', 'info');
  try {
    const q = encodeURIComponent(`"${FOTO_FOLDER}" in parents and mimeType contains "image/" and trashed = false`);
    let alleFiles = []; let pageTokenF = '';
    do {
      const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=nextPageToken,files(id,name)&pageSize=1000${pageTokenF ? '&pageToken='+pageTokenF : ''}`;
      const pageR = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
      if (pageR.status === 401) throw new Error('Sessie verlopen — log opnieuw in');
      const pageD = await pageR.json();
      alleFiles = alleFiles.concat(pageD.files || []);
      pageTokenF = pageD.nextPageToken || '';
    } while (pageTokenF);
    const driveData = { files: alleFiles };

    const sheetR = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/FOTO!B:K`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const sheetData = await sheetR.json();
    const sheetInfo = {};
    (sheetData.values || []).slice(1).forEach(row => {
      const naam = row[0]?.trim();
      if (naam) sheetInfo[naam] = {
        fileId: row[8]?.trim() || '',
        trefwoorden: row[9]?.trim() || '',
        seizoen: row[7]?.trim() || 'seizoensneutraal',
        sfeer: row[6]?.trim() || 'rustig',
        mensen: row[5]?.trim() || 'nee',
      };
    });

    const alleFiles = driveData.files || [];
    fotos = alleFiles
      .filter(f => { const i = sheetInfo[f.name]; return !i || !i.fileId || !i.trefwoorden; })
      .map(f => {
        const info = sheetInfo[f.name] || {};
        const rawTags = (info.trefwoorden || '').split(',').map(t=>t.trim()).filter(Boolean);
        return {
          id: f.id, name: f.name,
          trefwoorden: [...new Set(rawTags)].join(', '),
          seizoen: info.seizoen || 'seizoensneutraal',
          sfeer: info.sfeer || 'rustig',
          weer: info.weer || 'geen',
          mensen: info.mensen || 'nee',
          saved: false, cardStatus: '', cardStatusType: ''
        };
      });

    fotoLoaded = true;
    renderFotos();
    setStatus('foto-status', `${fotos.length} foto's te verwerken`, 'success');
  } catch(e) {
    setStatus('foto-status', e.message, 'error');
  }
}

function renderFotos() {
  const saved = fotos.filter(f=>f.saved).length;
  $('foto-count').textContent = `${saved} / ${fotos.length} opgeslagen`;
  $('foto-progress').style.width = fotos.length ? `${(saved/fotos.length)*100}%` : '0%';
  $('foto-grid').innerHTML = fotos.map((f, i) => {
    const activeTags = f.trefwoorden ? f.trefwoorden.split(',').map(t=>t.trim()).filter(Boolean) : [];
    const extraTags = activeTags.filter(t => !FOTO_TAGS.includes(t)).join(', ');
    return `
    <div class="card ${f.saved?'saved':''}" id="fcard-${i}">
      <div class="thumb" onclick="openLightbox('https://drive.google.com/thumbnail?id=${f.id}&sz=w800')">
        <img src="https://drive.google.com/thumbnail?id=${f.id}&sz=w400" alt="${f.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="no-media" style="display:none">🖼️<span>geen preview</span></div>
      </div>
      <div class="card-body">
        <div class="card-name">${f.name}</div>
        <span class="section-label">Trefwoorden</span>
        <div class="tags-grid" id="ftags-${i}">
          ${FOTO_TAGS.map(tag => `<span class="tag-chip${activeTags.includes(tag)?' active':''}" data-tag="${tag}" onclick="toggleFotoTag(${i},'${tag}')">${tag}</span>`).join('')}
        </div>
        <input type="text" class="tag-extra" id="fextra-${i}" value="${extraTags}" placeholder="extra trefwoorden..." oninput="updateFotoExtra(${i},this.value)">
        <div class="selects" style="grid-template-columns:1fr 1fr 1fr 1fr">
          <div><span class="section-label">Seizoen</span><select onchange="fotos[${i}].seizoen=this.value">${SEIZOEN.map(s=>`<option value="${s}"${f.seizoen===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div><span class="section-label">Sfeer</span><select onchange="fotos[${i}].sfeer=this.value">${SFEER.map(s=>`<option value="${s}"${f.sfeer===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div><span class="section-label">Weer</span><select onchange="fotos[${i}].weer=this.value">${WEER.map(s=>`<option value="${s}"${(f.weer||'geen')===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div><span class="section-label">Mensen</span><select onchange="fotos[${i}].mensen=this.value"><option value="nee"${f.mensen==='nee'?' selected':''}>nee</option><option value="ja"${f.mensen==='ja'?' selected':''}>ja</option></select></div>
        </div>
        <div class="btn-row">
          <button class="sm primary" onclick="saveFoto(${i})">↓ Opslaan</button>
          <button class="btn-delete" onclick="bevestigVerwijder('foto', ${i})">🗑 Verwijderen</button>
        </div>
        <div class="card-status ${f.cardStatusType}" id="fstatus-${i}">${f.cardStatus}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleFotoTag(i, tag) {
  let tags = fotos[i].trefwoorden ? fotos[i].trefwoorden.split(',').map(t=>t.trim()).filter(Boolean) : [];
  const idx = tags.indexOf(tag);
  if (idx === -1) tags.push(tag); else tags.splice(idx, 1);
  fotos[i].trefwoorden = [...new Set(tags)].join(', ');
  $(`ftags-${i}`)?.querySelectorAll('.tag-chip').forEach(c => c.classList.toggle('active', tags.includes(c.dataset.tag)));
  $(`fextra-${i}`).value = tags.filter(t => !FOTO_TAGS.includes(t)).join(', ');
}

function updateFotoExtra(i, val) {
  const fromChips = (fotos[i].trefwoorden||'').split(',').map(t=>t.trim()).filter(t => FOTO_TAGS.includes(t));
  const fromExtra = val.split(',').map(t=>t.trim()).filter(Boolean);
  fotos[i].trefwoorden = [...new Set([...fromChips, ...fromExtra])].join(', ');
}

async function saveFoto(i) {
  const f = fotos[i];
  if (!f.trefwoorden?.trim()) { updateFotoCard(i, 'error', '⚠ Voeg minimaal 1 trefwoord toe'); return; }
  updateFotoCard(i, 'loading', 'Opslaan...');
  try {
    const searchR = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/FOTO!B:B`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (searchR.status === 401) throw new Error('Sessie verlopen');
    const rows = (await searchR.json()).values || [];
    const rowIdx = rows.findIndex(r => r[0] === f.name);
    if (rowIdx === -1) { updateFotoCard(i, 'error', 'Naam niet gevonden in Sheet'); return; }
    const nu = new Date().toLocaleString('nl-BE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/FOTO!J${rowIdx+1}:P${rowIdx+1}?valueInputOption=USER_ENTERED`,
      { method: 'PUT', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[f.id, f.trefwoorden, f.seizoen, f.sfeer, f.mensen, f.weer || 'geen', 'nee', nu]] }) }
    );
    fotos[i].saved = true;
    updateFotoCard(i, 'saved', '✓ Opgeslagen');
    $(`fcard-${i}`)?.classList.add('saved');
    renderFotoToolbar();
  } catch(e) { updateFotoCard(i, 'error', e.message); }
}

function updateFotoCard(i, type, msg) {
  fotos[i].cardStatus = msg; fotos[i].cardStatusType = type;
  const el = $(`fstatus-${i}`);
  if (el) { el.textContent = msg; el.className = `card-status ${type}`; }
}

function renderFotoToolbar() {
  const saved = fotos.filter(f=>f.saved).length;
  $('foto-count').textContent = `${saved} / ${fotos.length} opgeslagen`;
  $('foto-progress').style.width = fotos.length ? `${(saved/fotos.length)*100}%` : '0%';
}

async function saveAllFotos() {
  for (let i = 0; i < fotos.length; i++) {
    if (!fotos[i].saved) { await saveFoto(i); await new Promise(r => setTimeout(r, 300)); }
  }
}

// ═══════════════════════════════════════════════════════════════════
// VIDEO
// ═══════════════════════════════════════════════════════════════════
async function laadVideos() {
  if (videoLoaded) return;
  setStatus('video-status', 'Video\'s laden...', 'info');
  try {
    const q = encodeURIComponent(`'${VIDEO_FOLDER}' in parents and mimeType contains 'video/' and trashed=false`);
    let alleVFiles = []; let pageTokenV = '';
    do {
      const urlV = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=nextPageToken,files(id,name,mimeType)&pageSize=1000${pageTokenV ? '&pageToken='+pageTokenV : ''}`;
      const pageRV = await fetch(urlV, { headers: { Authorization: `Bearer ${accessToken}` } });
      if (pageRV.status === 401) throw new Error('Sessie verlopen — log opnieuw in');
      const pageDV = await pageRV.json();
      alleVFiles = alleVFiles.concat(pageDV.files || []);
      pageTokenV = pageDV.nextPageToken || '';
    } while (pageTokenV);
    const data = { files: alleVFiles };

    await laadVideoSheetData();

    const alleVideoFiles = data.files || [];
    videos = alleVideoFiles
      .filter(f => {
        const ex = sheetRowMap[f.name];
        return !ex || !ex.trefwoorden || !ex.beschrijving;
      })
      .map(f => {
        const ex = sheetRowMap[f.name] || {};
        return {
          id: f.id, name: f.name, mimeType: f.mimeType,
          beschrijving: ex.beschrijving || '',
          categorie: ex.categorie || 'video',
          trefwoorden: ex.trefwoorden || '',
          seizoen: ex.seizoen || 'seizoensneutraal',
          sfeer: ex.sfeer || 'rustig',
          weer: ex.weer || 'geen',
          mensen: ex.mensen || 'nee',
          sheetRow: ex.sheetRow || null,
          saved: !!ex.sheetRow,
          chips: ex.trefwoorden ? ex.trefwoorden.split(',').map(s=>s.trim()).filter(Boolean) : [],
          cardStatus: ex.sheetRow ? '✓ Al opgeslagen' : '',
          cardStatusType: ex.sheetRow ? 'saved' : ''
        };
      });

    videoLoaded = true;
    renderVideos();
    setStatus('video-status', `${videos.length} video's geladen`, 'success');
  } catch(e) {
    setStatus('video-status', e.message, 'error');
  }
}

async function laadVideoSheetData() {
  sheetRowMap = {};
  try {
    const r = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/VIDEO!A:Q`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (!r.ok) return;
    const rows = (await r.json()).values || [];
    rows.forEach((row, idx) => {
      if (idx === 0) return;
      const naam = row[1];
      if (!naam) return;
      sheetRowMap[naam] = {
        sheetRow: idx + 1, categorie: row[2] || '',
        beschrijving: row[6] || '', trefwoorden: row[11] || '',
        seizoen: row[12] || 'seizoensneutraal', sfeer: row[13] || 'rustig', mensen: row[14] || 'nee'
      };
    });
  } catch(e) {}
}

function renderVideos() {
  const visible = videos;
  $('video-count').textContent = `${videos.length} video's te verwerken`;
  $('video-progress').style.width = '0%';

  if (!visible.length) {
    $('video-grid').innerHTML = '<div class="empty-state"><div class="icon">✓</div><p>Alle video\'s zijn verwerkt.</p></div>';
    return;
  }

  $('video-grid').innerHTML = visible.map(v => {
    const i = videos.indexOf(v);
    const chips = VIDEO_TAGS.map(tag => {
      const active = v.chips.includes(tag) ? ' active' : '';
      return `<span class="tag-chip${active}" data-tag="${tag}" onclick="toggleVideoChip(${i},'${tag}')">${tag}</span>`;
    }).join('');
    const extraChips = v.chips.filter(c => !VIDEO_TAGS.includes(c)).join(', ');
    return `
    <div class="card ${v.saved?'saved':''}" id="vcard-${i}">
      <div class="thumb" onclick="toggleVideoPreview(${i})">
        <video id="vid-${i}" src="" preload="none" muted loop playsinline style="display:none"></video>
        <div class="no-media" id="novid-${i}"><div style="font-size:28px">🎬</div><span>${v.name}</span><span style="font-size:10px">Klik voor preview</span></div>
        <div class="play-overlay"><div class="play-icon">▶</div></div>
      </div>
      <div class="card-body">
        <div class="card-name">${v.name}</div>
        <span class="section-label">Beschrijving</span>
        <textarea class="desc-area" placeholder="Wat zie je? Hoe beweegt de camera?" oninput="videos[${i}].beschrijving=this.value">${v.beschrijving}</textarea>
        <span class="section-label">Trefwoorden</span>
        <div class="tags-grid" id="vchips-${i}">${chips}</div>
        <input type="text" class="tag-extra" placeholder="extra trefwoorden..." value="${extraChips}" oninput="updateVideoExtra(${i},this.value)">
        <div class="selects" style="margin-top:8px;grid-template-columns:1fr 1fr 1fr 1fr">
          <div><span class="section-label">Seizoen</span><select onchange="videos[${i}].seizoen=this.value">${SEIZOEN.map(s=>`<option value="${s}"${v.seizoen===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div><span class="section-label">Sfeer</span><select onchange="videos[${i}].sfeer=this.value">${SFEER.map(s=>`<option value="${s}"${v.sfeer===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div><span class="section-label">Weer</span><select onchange="videos[${i}].weer=this.value">${WEER.map(s=>`<option value="${s}"${(v.weer||'geen')===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div><span class="section-label">Mensen</span><select onchange="videos[${i}].mensen=this.value"><option value="nee"${v.mensen==='nee'?' selected':''}>nee</option><option value="ja"${v.mensen==='ja'?' selected':''}>ja</option></select></div>
        </div>
        <div class="btn-row">
          <button class="sm primary" onclick="saveVideo(${i})">↓ Opslaan in Sheet</button>
          <button class="btn-delete" onclick="bevestigVerwijder('video', ${i})">🗑 Verwijderen</button>
        </div>
        <div class="card-status ${v.cardStatusType}" id="vstatus-${i}">${v.cardStatus}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleVideoChip(i, tag) {
  const idx = videos[i].chips.indexOf(tag);
  if (idx === -1) videos[i].chips.push(tag); else videos[i].chips.splice(idx, 1);
  videos[i].trefwoorden = videos[i].chips.join(', ');
  $(`vchips-${i}`)?.querySelector(`[data-tag="${tag}"]`)?.classList.toggle('active', videos[i].chips.includes(tag));
}

function updateVideoExtra(i, val) {
  const std = videos[i].chips.filter(c => VIDEO_TAGS.includes(c));
  const extra = val.split(',').map(s=>s.trim()).filter(Boolean);
  videos[i].chips = [...new Set([...std, ...extra])];
  videos[i].trefwoorden = videos[i].chips.join(', ');
}

function toggleVideoPreview(i) {
  const v = videos[i]; const el = $(`vid-${i}`); const nov = $(`novid-${i}`);
  if (!el) return;
  if (!loadedPreviews.has(i)) {
    loadedPreviews.add(i);
    nov.innerHTML = '<div style="font-size:12px;color:#aaa">⟳ laden…</div>';
    fetch(`https://www.googleapis.com/drive/v3/files/${v.id}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.blob(); })
      .then(blob => { el.src = URL.createObjectURL(blob); el.style.display = 'block'; nov.style.display = 'none'; el.play(); })
      .catch(e => { nov.innerHTML = `<div style="font-size:11px;color:#c66">Preview mislukt</div>`; });
    return;
  }
  el.paused ? el.play() : el.pause();
}

async function saveVideo(i) {
  const v = videos[i];
  updateVideoCard(i, 'loading', '⟳ Opslaan…');
  try {
    const nu = new Date().toLocaleString('nl-BE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const driveLink = `https://drive.google.com/file/d/${v.id}/view`;
    const rowData = [nu, v.name, v.categorie, driveLink, '', '', v.beschrijving, '', '', 'te beschrijven', v.id, v.trefwoorden, v.seizoen, v.sfeer, v.mensen, v.weer || 'geen', 'nee', nu];
    if (v.sheetRow) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/VIDEO!A${v.sheetRow}:Q${v.sheetRow}?valueInputOption=USER_ENTERED`,
        { method: 'PUT', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values: [rowData] }) });
    } else {
      const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/VIDEO!A:Q:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
        { method: 'POST', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ values: [rowData] }) });
      const rd = await r.json();
      const match = (rd.updates?.updatedRange || '').match(/!A(\d+)/);
      if (match) videos[i].sheetRow = parseInt(match[1]);
    }
    videos[i].saved = true;
    updateVideoCard(i, 'saved', '✓ Opgeslagen');
    $(`vcard-${i}`)?.classList.add('saved');
    renderVideoToolbar();
  } catch(e) { updateVideoCard(i, 'error', 'Fout: ' + e.message); }
}

function updateVideoCard(i, type, msg) {
  videos[i].cardStatus = msg; videos[i].cardStatusType = type;
  const el = $(`vstatus-${i}`);
  if (el) { el.textContent = msg; el.className = `card-status ${type}`; }
}

function renderVideoToolbar() {
  const saved = videos.filter(v=>v.saved).length;
  $('video-count').textContent = `${saved} / ${videos.length} opgeslagen`;
  $('video-progress').style.width = videos.length ? `${(saved/videos.length)*100}%` : '0%';
}

async function saveAllVideos() {
  for (let i = 0; i < videos.length; i++) {
    if (!videos[i].saved) { await saveVideo(i); await new Promise(r => setTimeout(r, 300)); }
  }
}

function setVideoFilter(f) {
  videoFilter = f;
  ['alle','open','klaar'].forEach(k => $(`filter-${k}`)?.classList.toggle('active', k === f));
  renderVideos();
}

// ── VERWIJDEREN ──────────────────────────────────────────────────
let confirmCallback = null;

function bevestigVerwijder(type, i) {
  const naam = type === 'foto' ? fotos[i].name : videos[i].name;
  const inSheet = type === 'foto' ? false : !!videos[i].sheetRow;
  const sheetTxt = inSheet ? ' De rij in de Sheet wordt ook verwijderd.' : '';
  $('confirm-title').textContent = 'Verwijderen?';
  $('confirm-desc').textContent = `"${naam}" wordt permanent verwijderd uit Drive.${sheetTxt}`;
  confirmCallback = () => verwijder(type, i);
  $('confirm-ok').onclick = () => { closeConfirm(); confirmCallback(); };
  $('confirm-modal').classList.add('open');
}

function closeConfirm() {
  $('confirm-modal').classList.remove('open');
  confirmCallback = null;
}

async function verwijder(type, i) {
  const item = type === 'foto' ? fotos[i] : videos[i];
  const statusId = type === 'foto' ? `fstatus-${i}` : `vstatus-${i}`;
  const cardId = type === 'foto' ? `fcard-${i}` : `vcard-${i}`;

  const statusEl = $(statusId);
  if (statusEl) { statusEl.textContent = 'Verwijderen...'; statusEl.className = 'card-status loading'; }

  try {
    // Stap 1: Verwijder uit Drive
    const driveR = await fetch(
      `https://www.googleapis.com/drive/v3/files/${item.id}`,
      { method: 'DELETE', headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (driveR.status === 401) throw new Error('Sessie verlopen');
    if (!driveR.ok && driveR.status !== 204) throw new Error('Drive verwijdering mislukt: ' + driveR.status);

    // Stap 2: Verwijder rij uit Sheet als die bestaat
    if (type === 'video' && item.sheetRow) {
      // Haal spreadsheet metadata op voor sheetId (gid)
      const metaR = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets(properties(sheetId,title))`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const meta = await metaR.json();
      const sheet = (meta.sheets || []).find(s => s.properties.title === 'VIDEO');
      if (sheet) {
        await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`,
          { method: 'POST',
            headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ requests: [{
              deleteDimension: {
                range: { sheetId: sheet.properties.sheetId, dimension: 'ROWS', startIndex: item.sheetRow - 1, endIndex: item.sheetRow }
              }
            }]})
          }
        );
      }
    }

    if (type === 'foto') {
      // Verwijder ook de FOTO Sheet rij als die bestaat
      const rowsR = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/FOTO!B:B`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const rows = (await rowsR.json()).values || [];
      const rowIdx = rows.findIndex(r => r[0] === item.name);
      if (rowIdx !== -1) {
        const metaR = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets(properties(sheetId,title))`,
          { headers: { Authorization: `Bearer ${accessToken}` } }
        );
        const meta = await metaR.json();
        const sheet = (meta.sheets || []).find(s => s.properties.title === 'FOTO');
        if (sheet) {
          await fetch(
            `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`,
            { method: 'POST',
              headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ requests: [{
                deleteDimension: {
                  range: { sheetId: sheet.properties.sheetId, dimension: 'ROWS', startIndex: rowIdx, endIndex: rowIdx + 1 }
                }
              }]})
            }
          );
        }
      }
      fotos.splice(i, 1);
      renderFotos();
    } else {
      videos.splice(i, 1);
      renderVideos();
    }

  } catch(e) {
    if (statusEl) { statusEl.textContent = 'Fout: ' + e.message; statusEl.className = 'card-status error'; }
  }
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────
function openLightbox(src) { $('lightbox-img').src = src; $('lightbox').classList.add('open'); }
function closeLightbox() { $('lightbox').classList.remove('open'); $('lightbox-img').src = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
